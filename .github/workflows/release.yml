name: Compile and Release

on:
  push:
    tags:
      - 'v*' # Triggers the workflow when you push a version tag (like v1.0.1)

jobs:
  run-tests:
    name: Run Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: |
          python -m unittest tests/test_watermark.py

  build-windows:
    name: Build Windows EXE
    needs: run-tests
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Compile Executable
        run: |
          python -m PyInstaller --onefile watermark_script.py

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/watermark_script.exe

  build-mac:
    name: Build macOS App
    needs: run-tests
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Compile Executable
        run: |
          python -m PyInstaller --onefile watermark_script.py

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-binary
          path: dist/watermark_script

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: windows-release

      - name: Download macOS Binary
        uses: actions/download-artifact@v4
        with:
          name: mac-binary
          path: mac-release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-release/watermark_script.exe
            mac-release/watermark_script
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
